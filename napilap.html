<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAPILAP — Valós hírek</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=IM+Fell+English:ital@0;1&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1a1208;--paper:#f5f0e8;--paper-dark:#ece6d4;--accent:#8b1a1a;--rule:#2a1f0e;--mid:#5a4a32;--light-rule:#c8b89a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);font-family:'Source Serif 4',Georgia,serif;min-height:100vh;}

  .masthead{border-bottom:3px double var(--rule);padding:0 1.5rem;text-align:center;}
  .top-bar{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--light-rule);padding:6px 0;font-size:0.68rem;letter-spacing:0.08em;color:var(--mid);}
  .paper-name{font-family:'Playfair Display',serif;font-size:clamp(2.8rem,8vw,5rem);font-weight:900;line-height:1;padding:0.3em 0 0.15em;}
  .paper-name span{color:var(--accent);}
  .tagline{font-family:'IM Fell English',serif;font-style:italic;font-size:0.88rem;color:var(--mid);border-top:1px solid var(--light-rule);border-bottom:1px solid var(--light-rule);padding:5px 0;margin-bottom:6px;}

  .section-nav{border-bottom:3px double var(--rule);overflow-x:auto;scrollbar-width:none;}
  .section-nav::-webkit-scrollbar{display:none;}
  .nav-inner{display:flex;max-width:1100px;margin:0 auto;}
  .nav-btn{flex:0 0 auto;padding:9px 16px;font-family:'Source Serif 4',serif;font-size:0.7rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;border:none;background:none;cursor:pointer;color:var(--mid);border-right:1px solid var(--light-rule);transition:background 0.15s,color 0.15s;}
  .nav-btn:hover,.nav-btn.active{background:var(--ink);color:var(--paper);}

  .container{max-width:1100px;margin:0 auto;padding:0 1rem;}
  .toolbar{display:flex;gap:8px;padding:0.8rem 0;border-bottom:1px solid var(--light-rule);align-items:center;}
  .toolbar-btn{background:var(--ink);color:var(--paper);border:none;font-family:'Source Serif 4',serif;font-weight:600;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;padding:7px 14px;cursor:pointer;transition:background 0.15s;white-space:nowrap;}
  .toolbar-btn:hover{background:var(--accent);}
  .toolbar-btn:disabled{opacity:0.45;cursor:not-allowed;}
  .toolbar-btn.ghost{background:none;color:var(--mid);border:1px solid var(--light-rule);}
  .toolbar-btn.ghost:hover{background:var(--paper-dark);color:var(--ink);}

  .date-rule{display:flex;align-items:center;gap:12px;padding:8px 0;font-family:'IM Fell English',serif;font-style:italic;font-size:0.8rem;color:var(--mid);}
  .date-rule::before,.date-rule::after{content:'';flex:1;height:1px;background:var(--light-rule);}

  .news-grid{display:grid;grid-template-columns:repeat(12,1fr);border-top:2px solid var(--rule);}

  .story-lead{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--rule);}
  .story-lead .story-text{padding:1.2rem 1.5rem;border-right:1px solid var(--rule);}
  .story-lead .story-img{overflow:hidden;min-height:220px;background:var(--paper-dark);display:flex;align-items:center;justify-content:center;}
  .story-lead .story-img img{width:100%;height:100%;object-fit:cover;opacity:0.85;}
  .story-lead .story-img .no-img{font-size:6rem;opacity:0.18;}

  .story-col{grid-column:span 4;padding:1rem 1.2rem;border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);}
  .story-wide{grid-column:span 8;padding:1rem 1.2rem;border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);}
  .story-sidebar{grid-column:span 4;padding:1rem 1.2rem;background:var(--paper-dark);border-bottom:1px solid var(--rule);}

  .section-tag{font-family:'Source Serif 4',serif;font-weight:600;font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);border-bottom:1px solid var(--accent);display:inline-block;padding-bottom:2px;margin-bottom:8px;}
  .story-headline{font-family:'Playfair Display',serif;font-weight:700;line-height:1.15;margin-bottom:8px;}
  .story-lead .story-headline{font-size:clamp(1.5rem,3vw,2.2rem);}
  .story-col .story-headline{font-size:1.1rem;}
  .story-wide .story-headline{font-size:1.35rem;}
  .story-sidebar .story-headline{font-size:1rem;font-style:italic;}
  .story-deck{font-family:'IM Fell English',serif;font-style:italic;font-size:0.92rem;color:var(--mid);line-height:1.45;margin-bottom:10px;}
  .story-lead .story-deck{font-size:1.05rem;}
  .story-body{font-size:0.82rem;line-height:1.7;color:#2d2010;}
  .story-lead .story-body{columns:2;column-gap:1.2rem;}
  .byline{font-size:0.65rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--mid);margin-top:10px;font-weight:600;}
  .source-link{color:var(--accent);text-decoration:none;margin-left:6px;font-weight:400;text-transform:none;letter-spacing:0;}
  .source-link:hover{text-decoration:underline;}

  .state-box{grid-column:1/-1;text-align:center;padding:3rem 1rem;font-family:'IM Fell English',serif;font-style:italic;font-size:1.05rem;color:var(--mid);}
  .spinner{display:inline-block;width:26px;height:26px;border:2px solid var(--light-rule);border-top-color:var(--accent);border-radius:50%;animation:spin 0.75s linear infinite;margin-bottom:12px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .progress-text{font-size:0.8rem;margin-top:6px;color:var(--mid);}

  /* API KEY SETUP */
  .setup-box{grid-column:1/-1;padding:2.5rem 2rem;text-align:center;}
  .setup-box h3{font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:0.5rem;}
  .setup-box p{font-size:0.84rem;color:var(--mid);line-height:1.7;max-width:440px;margin:0 auto 1.2rem;}
  .setup-box a{color:var(--accent);}
  .setup-steps{text-align:left;max-width:380px;margin:0 auto 1.2rem;font-size:0.8rem;color:var(--mid);line-height:1.9;}
  .setup-steps li{margin-left:1.2rem;}
  .api-key-row{display:flex;gap:8px;max-width:440px;margin:0 auto;}
  .api-key-input{flex:1;border:1px solid var(--light-rule);background:var(--paper);font-family:monospace;font-size:0.8rem;padding:8px 10px;outline:none;color:var(--ink);}
  .api-key-input:focus{border-color:var(--accent);}
  .api-key-btn{background:var(--accent);color:var(--paper);border:none;cursor:pointer;font-family:'Source Serif 4',serif;font-size:0.75rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:8px 16px;white-space:nowrap;}
  .api-note{font-size:0.72rem;color:var(--mid);margin-top:0.8rem;font-style:italic;}

  .paper-footer{border-top:3px double var(--rule);text-align:center;padding:1rem;font-family:'IM Fell English',serif;font-style:italic;font-size:0.78rem;color:var(--mid);margin-top:2rem;}

  @media(max-width:680px){
    .story-lead{grid-template-columns:1fr;}
    .story-lead .story-img{display:none;}
    .story-col,.story-wide,.story-sidebar{grid-column:1/-1;border-right:none;}
    .story-lead .story-body{columns:1;}
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="container">
    <div class="top-bar">
      <span id="dateDisplay">—</span>
      <span>★ Valós RSS hírek · Claude AI fordítás ★</span>
      <span id="statusBar">—</span>
    </div>
    <div class="paper-name">NAPI<span>LAP</span></div>
    <div class="tagline">A világ hírei magyarul — RSS forrásokból, AI összefoglalással</div>
  </div>
</header>

<nav class="section-nav">
  <div class="nav-inner">
    <button class="nav-btn active" data-id="hirek">Magyarország</button>
    <button class="nav-btn" data-id="vilag">Világ</button>
    <button class="nav-btn" data-id="gazdasag">Gazdaság</button>
    <button class="nav-btn" data-id="sport">Sport</button>
    <button class="nav-btn" data-id="tech">Technológia</button>
    <button class="nav-btn" data-id="tudomany">Tudomány</button>
    <button class="nav-btn" data-id="kultura">Kultúra</button>
  </div>
</nav>

<main class="container">
  <div class="toolbar">
    <button class="toolbar-btn" id="refreshBtn">↻ Frissítés</button>
    <button class="toolbar-btn ghost" id="settingsBtn">⚙ API kulcs</button>
  </div>
  <div class="date-rule" id="sectionLabel">Töltés…</div>
  <div class="news-grid" id="newsGrid">
    <div class="state-box">Indítás…</div>
  </div>
</main>

<footer class="paper-footer">
  <div class="container">
    NAPILAP © <span id="year"></span> — Hírek: Telex · Index · BBC · Reuters · Claude AI fordítás
  </div>
</footer>

<script>
const now = new Date();
document.getElementById('dateDisplay').textContent =
  now.toLocaleDateString('hu-HU',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
document.getElementById('year').textContent = now.getFullYear();

// RSS feeds per category — via rss2json proxy (no CORS issue, free)
const FEEDS = {
  hirek: {
    label: 'Magyarország',
    emoji: '🇭🇺',
    section: 'Belpolitika',
    urls: [
      'https://telex.hu/rss',
      'https://index.hu/24ora/rss/'
    ]
  },
  vilag: {
    label: 'Világ',
    emoji: '🌍',
    section: 'Külföld',
    urls: [
      'https://feeds.bbci.co.uk/news/world/rss.xml',
      'https://feeds.reuters.com/reuters/worldNews'
    ]
  },
  gazdasag: {
    label: 'Gazdaság',
    emoji: '📈',
    section: 'Gazdaság',
    urls: [
      'https://feeds.bbci.co.uk/news/business/rss.xml',
      'https://portfolio.hu/rss/all.xml'
    ]
  },
  sport: {
    label: 'Sport',
    emoji: '⚽',
    section: 'Sport',
    urls: [
      'https://feeds.bbci.co.uk/sport/rss.xml',
      'https://totalcar.hu/rss/'
    ]
  },
  tech: {
    label: 'Technológia',
    emoji: '💻',
    section: 'Technológia',
    urls: [
      'https://feeds.bbci.co.uk/news/technology/rss.xml',
      'https://www.theverge.com/rss/index.xml'
    ]
  },
  tudomany: {
    label: 'Tudomány',
    emoji: '🔬',
    section: 'Tudomány',
    urls: [
      'https://rss.sciam.com/ScientificAmerican-Global',
      'https://feeds.bbci.co.uk/news/science_and_environment/rss.xml'
    ]
  },
  kultura: {
    label: 'Kultúra',
    emoji: '🎭',
    section: 'Kultúra',
    urls: [
      'https://feeds.bbci.co.uk/news/entertainment_and_arts/rss.xml',
      'https://hvg.hu/rss/kultura'
    ]
  }
};

const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';

let claudeKey = '';
let currentId = 'hirek';
try{ claudeKey = localStorage.getItem('napilap_claude') || ''; }catch(e){}

function updateStatus(){
  document.getElementById('statusBar').textContent = claudeKey ? '✓ Claude kapcsolódva' : '⚠ API kulcs hiányzik';
}
updateStatus();

// NAV
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentId = btn.dataset.id;
    loadFeed(currentId);
  });
});

document.getElementById('refreshBtn').addEventListener('click', () => loadFeed(currentId));
document.getElementById('settingsBtn').addEventListener('click', showSetup);

function showSetup(){
  document.getElementById('sectionLabel').textContent = 'Beállítások';
  document.getElementById('newsGrid').innerHTML = `
    <div class="setup-box">
      <h3>Claude API kulcs</h3>
      <p>Az app az Anthropic Claude AI-t használja a hírek magyar fordításához és összefoglalásához.</p>
      <ol class="setup-steps">
        <li>Menj a <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a> oldalra</li>
        <li>Regisztrálj — új fiókhoz $5 kredit jár ingyen</li>
        <li>Settings → API Keys → <strong>Create Key</strong></li>
        <li>Másold be ide:</li>
      </ol>
      <div class="api-key-row">
        <input class="api-key-input" id="apiKeyInput" type="password" placeholder="sk-ant-api03-…" value="${claudeKey}" autocomplete="off">
        <button class="api-key-btn" id="apiKeyBtn">Mentés &amp; Indítás</button>
      </div>
      <p class="api-note">~$0.01 / hírbetöltés · $5 kezdőkredit ≈ 500 betöltés · RSS ingyenes</p>
    </div>`;

  const btn = document.getElementById('apiKeyBtn');
  const inp = document.getElementById('apiKeyInput');
  btn.addEventListener('click', () => {
    const k = inp.value.trim();
    if(k.startsWith('sk-') && k.length > 20){
      claudeKey = k;
      try{ localStorage.setItem('napilap_claude', k); }catch(e){}
      updateStatus();
      loadFeed(currentId);
    } else {
      inp.style.borderColor = 'var(--accent)';
    }
  });
  inp.addEventListener('keydown', e => { if(e.key==='Enter') btn.click(); });
}

async function fetchRSS(url){
  const res = await fetch(RSS2JSON + encodeURIComponent(url) + '&count=6');
  const data = await res.json();
  if(data.status !== 'ok') return [];
  return data.items || [];
}

async function loadFeed(id){
  if(!claudeKey){ showSetup(); return; }

  const feed = FEEDS[id];
  const grid = document.getElementById('newsGrid');
  const lbl = document.getElementById('sectionLabel');
  const refreshBtn = document.getElementById('refreshBtn');

  grid.innerHTML = `<div class="state-box"><div class="spinner"></div><div class="progress-text">RSS hírek letöltése…</div></div>`;
  lbl.textContent = `${feed.label} — ${now.toLocaleDateString('hu-HU',{month:'long',day:'numeric'})}`;
  refreshBtn.disabled = true;

  try {
    // Fetch from both RSS feeds in parallel
    const results = await Promise.allSettled(feed.urls.map(u => fetchRSS(u)));
    let items = [];
    results.forEach(r => { if(r.status==='fulfilled') items = items.concat(r.value); });

    // Deduplicate by title, take top 5
    const seen = new Set();
    items = items.filter(i => {
      if(seen.has(i.title)) return false;
      seen.add(i.title); return true;
    }).slice(0, 5);

    if(!items.length) throw new Error('Nem sikerült hírt betölteni. Próbálj más rovatot.');

    grid.querySelector('.progress-text').textContent = `${items.length} hír megtalálva · Claude fordít…`;

    // Build text for Claude
    const rawNews = items.map((item, i) => {
      const desc = item.description
        ? item.description.replace(/<[^>]*>/g,'').substring(0,300)
        : '';
      return `${i+1}. Cím: ${item.title}\nForrás: ${item.author||new URL(item.link).hostname}\nLeírás: ${desc}`;
    }).join('\n\n');

    // Claude summarize in Hungarian
    const claudeRes = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': claudeKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 2000,
        system: `Te egy tapasztalt magyar újságíró vagy. Kapsz valós friss híreket. Fordítsd le és foglald össze őket tömör, olvasmányos magyar napilap stílusban. CSAK valid JSON tömböt adj vissza, semmi mást, semmi magyarázatot.
Minden objektum mezői:
- headline: magyar főcím (max 12 szó, ütős, figyelemfelkeltő)
- deck: magyar alcím/bevezető (max 20 szó)
- body: 2-3 mondatos összefoglaló magyarul
- section: magyar rovatcím
- byline: kitalált magyar újságíró neve
Formátum: [{"headline":"...","deck":"...","body":"...","section":"...","byline":"..."}]`,
        messages:[{
          role:'user',
          content:`Fordítsd le és foglald össze magyarul ezt a(z) ${feed.label} témájú ${items.length} hírt:\n\n${rawNews}\n\nCsak JSON tömb.`
        }]
      })
    });

    if(claudeRes.status===401){
      claudeKey='';
      try{localStorage.removeItem('napilap_claude');}catch(e){}
      throw new Error('Érvénytelen Claude API kulcs.');
    }

    const claudeData = await claudeRes.json();
    if(claudeData.error) throw new Error('Claude: '+claudeData.error.message);

    const raw = claudeData.content?.find(b=>b.type==='text')?.text||'';
    const match = raw.match(/\[[\s\S]*\]/);
    if(!match) throw new Error('Claude nem adott vissza érvényes JSON-t.');
    const summarized = JSON.parse(match[0]);

    // Merge with original RSS data (image, url, source)
    const merged = summarized.map((s,i)=>({
      ...s,
      url: items[i]?.link || '#',
      image: items[i]?.enclosure?.link || items[i]?.thumbnail || null,
      source: items[i] ? new URL(items[i].link).hostname.replace('www.','') : ''
    }));

    renderNews(merged, feed);

  } catch(e){
    console.error(e);
    grid.innerHTML = `<div class="state-box" style="color:var(--accent)">
      ⚠ ${e.message}
      <br>
      <button onclick="loadFeed('${id}')" style="margin-top:14px;padding:7px 18px;background:var(--ink);color:var(--paper);border:none;cursor:pointer;font-family:inherit;font-size:0.8rem;letter-spacing:0.08em;text-transform:uppercase;">Újra</button>
      <button onclick="showSetup()" style="margin-top:14px;margin-left:8px;padding:7px 18px;background:none;color:var(--mid);border:1px solid var(--light-rule);cursor:pointer;font-family:inherit;font-size:0.8rem;letter-spacing:0.08em;text-transform:uppercase;">⚙ Beállítások</button>
    </div>`;
  } finally {
    refreshBtn.disabled = false;
    updateStatus();
  }
}

function renderNews(articles, feed){
  const grid = document.getElementById('newsGrid');
  if(!articles?.length){ grid.innerHTML=`<div class="state-box">Nincs találat.</div>`; return; }

  let html = '';
  const a0 = articles[0];
  html += `<article class="story-lead">
    <div class="story-text">
      <span class="section-tag">${a0.section||feed.section}</span>
      <h2 class="story-headline">${a0.headline}</h2>
      <p class="story-deck">${a0.deck}</p>
      <div class="story-body"><p>${a0.body}</p></div>
      <p class="byline">— ${a0.byline} · <a class="source-link" href="${a0.url}" target="_blank">${a0.source} ↗</a></p>
    </div>
    <div class="story-img">
      ${a0.image
        ? `<img src="${a0.image}" alt="" onerror="this.parentElement.innerHTML='<div class=no-img>${feed.emoji}</div>'">`
        : `<div class="no-img">${feed.emoji}</div>`}
    </div>
  </article>`;

  [articles[1],articles[2],articles[3]].forEach(a=>{
    if(!a) return;
    html+=`<article class="story-col">
      <span class="section-tag">${a.section||feed.section}</span>
      <h2 class="story-headline">${a.headline}</h2>
      <p class="story-deck">${a.deck}</p>
      <div class="story-body">${a.body}</div>
      <p class="byline">— ${a.byline} · <a class="source-link" href="${a.url}" target="_blank">${a.source} ↗</a></p>
    </article>`;
  });

  if(articles[4]){
    const a4=articles[4];
    html+=`<article class="story-wide">
      <span class="section-tag">${a4.section||feed.section}</span>
      <h2 class="story-headline">${a4.headline}</h2>
      <p class="story-deck">${a4.deck}</p>
      <div class="story-body">${a4.body}</div>
      <p class="byline">— ${a4.byline} · <a class="source-link" href="${a4.url}" target="_blank">${a4.source} ↗</a></p>
    </article>
    <article class="story-sidebar">
      <span class="section-tag">Szerkesztőség</span>
      <h2 class="story-headline">Más rovatok is várnak…</h2>
      <p class="story-deck">Kattints a felső navigációra további témakörökért.</p>
      <p class="byline" style="margin-top:1rem;">Források: Telex · Index · BBC · Reuters · Portfolio</p>
    </article>`;
  }

  grid.innerHTML = html;
  grid.querySelectorAll('article').forEach((el,i)=>{
    el.style.opacity='0'; el.style.transform='translateY(6px)';
    el.style.transition=`opacity 0.35s ease ${i*0.07}s,transform 0.35s ease ${i*0.07}s`;
    requestAnimationFrame(()=>{ el.style.opacity='1'; el.style.transform='translateY(0)'; });
  });
}

// Init
if(claudeKey) loadFeed(currentId);
else showSetup();
</script>
</body>
</html>
